version: 2

models:
  - name: stg_stock_prices
    description: "Cleaned daily OHLCV stock prices for 5 tickers"
    columns:
      - name: price_date
        description: "Trading date"
        tests:
          - not_null
      - name: ticker
        description: "Stock ticker symbol"
        tests:
          - not_null
          - accepted_values:
              values: ['AAPL', 'GOOGL', 'MSFT', 'AMZN', 'TSLA']
      - name: close_price
        description: "Closing price for the day"
        tests:
          - not_null
      - name: open_price
        tests:
          - not_null
      - name: high_price
        tests:
          - not_null
      - name: low_price
        tests:
          - not_null
      - name: volume
        tests:
          - not_null

  - name: stg_portfolio_transactions
    description: "Cleaned simulated portfolio transactions for 50 users"
    columns:
      - name: transaction_date
        description: "Date of the trade"
        tests:
          - not_null
      - name: user_id
        description: "User identifier"
        tests:
          - not_null
      - name: ticker
        tests:
          - not_null
          - accepted_values:
              values: ['AAPL', 'GOOGL', 'MSFT', 'AMZN', 'TSLA']
      - name: transaction_type
        description: "BUY or SELL"
        tests:
          - not_null
          - accepted_values:
              values: ['BUY', 'SELL']
      - name: shares_traded
        tests:
          - not_null
      - name: price_per_share
        tests:
          - not_null
      - name: trade_value
        tests:
          - not_null
